{% load static %}
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Loup Garou" />
<link rel="manifest" href="{% url 'pwa_manifest' %}" />
<link rel="apple-touch-icon" href="{% static 'images/favicon-wolf.png' %}" />
<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => navigator.serviceWorker.register("{% url 'service_worker' %}", {scope: "/"}).catch(() => {}));
  }
</script>
