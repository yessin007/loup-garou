{% load static %}
<!DOCTYPE html>
<html lang="{{ language_code }}" dir="{{ language_dir }}">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ room.room_title }} | Loup Garou</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}" />
  </head>
  <body class="room-page">
    <header class="guide-header">
      <a class="brand" href="{% url 'home' %}">Loup <span>Garou</span></a>
      <div class="guide-header-actions">{% include "pages/_language_selector.html" %}<a class="guide-back" href="{% url 'home' %}">{{ room.back }}</a></div>
    </header>
    <main class="room-shell">
      <section class="room-hero">
        <p class="eyebrow">Room</p>
        <h1>{{ room.room_title }}</h1>
        <p>{{ room.room_intro }}</p>
      </section>
      {% if error %}<p class="form-error" role="alert">{{ error }}</p>{% endif %}
      <div class="room-portals">
        <form class="room-card" method="post">
          {% csrf_token %}<input type="hidden" name="action" value="join" />
          <span>01</span><h2>{{ room.join }}</h2>
          <label>{{ room.room_code }}<input name="room_code" maxlength="6" autocomplete="off" required /></label>
          <label>{{ room.player_name }}<input name="player_name" maxlength="40" autocomplete="name" required /></label>
          <button type="submit">{{ room.join }} <span>→</span></button>
        </form>
        <form class="room-card" method="post">
          {% csrf_token %}<input type="hidden" name="action" value="history" />
          <span>02</span><h2>{{ room.history }}</h2>
          <label>{{ room.room_code }}<input name="room_code" maxlength="6" autocomplete="off" required /></label>
          <button type="submit">{{ room.open_history }} <span>→</span></button>
        </form>
      </div>
    </main>
  </body>
</html>
