services:
  frontend:
    build:
      context: ./frontend
    container_name: loup_garou_frontend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./frontend:/app
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      DJANGO_DEBUG: "1"
      DJANGO_SECRET_KEY: "dev-secret-key-change-me"
      BACKEND_PUBLIC_PORT: "5000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health/', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  backend:
    build:
      context: ./backend
    container_name: loup_garou_backend
    command: flask --app app run --host=0.0.0.0 --port=5000 --debug
    volumes:
      - ./backend:/app
    ports:
      - "127.0.0.1:5000:5000"
    environment:
      FLASK_ENV: development
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/api/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
